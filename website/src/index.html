<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CloudMail</title>
    <link rel="icon" href="/assets/favicon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <style>
      :root {
        color-scheme: light dark;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: Canvas;
        color: CanvasText;
      }
      main {
        width: min(680px, calc(100vw - 48px));
      }
      h1 {
        font-size: clamp(40px, 8vw, 72px);
        margin: 0 0 12px;
        letter-spacing: 0;
      }
      p {
        font-size: 18px;
        line-height: 1.5;
        color: color-mix(in srgb, CanvasText 72%, transparent);
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/assets/cloudmail-icon-192.png" alt="CloudMail" width="96" height="96" />
      <h1>CloudMail</h1>
      <p>Private Cloudflare-native mail with local-first AI and explicit consent controls.</p>
    </main>
  </body>
</html>
